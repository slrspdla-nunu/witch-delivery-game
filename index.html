<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>마녀 배달부의 비상착륙</title>
  <link rel="stylesheet" href="style.css?v=20260709q" />
  <script src="js/pixi.min.js"></script>
</head>
<body>
  <div class="screen" id="screen">
    <!-- 배경 -->
    <img class="bg" src="image/background_clean_generated_ext.png" alt="배경" />

    <!-- 지평선 태양빛 (배경 노을 위 은은한 발광) -->
    <div class="sun-glow" aria-hidden="true"></div>

    <!-- 로고 타이틀 -->
    <img class="logo" src="image/logo_title_hq.png" alt="마녀 배달부의 비상착륙" />
    <p class="subtitle">달빛 하늘 도시의 배달 이야기</p>

    <!-- 열기구 -->
    <img class="balloon" src="image/hot_air_balloon_large.png" alt="열기구" />

    <!-- 루나(마녀) : PixiJS 메쉬로 렌더링, 핀 존만 바람에 흔들림 -->
    <div class="luna-wrap">
      <div id="luna-mesh"></div>
      <img id="luna-fallback" src="image/luna_main_pose_transparent1.png" alt="루나" hidden />
    </div>

    <!-- 네로(고양이) : PixiJS 메쉬로 렌더링, 핀 존(양쪽 귀·꼬리)만 바람에 흔들림 -->
    <div class="nero-wrap">
      <div id="nero-mesh"></div>
      <img id="nero-fallback" src="image/nero_cat_transparent.png" alt="네로" hidden />
    </div>

    <!-- 게임 시작 -->
    <button class="start-btn" data-name="게임 시작">
      <img src="image/button_game_stat.png" alt="게임 시작" />
    </button>

    <!-- 인트로 안내: 터치하면 BGM 시작 + 메뉴 등장 -->
    <p class="touch-hint">터치해주세요</p>
    <!-- 상단 게임 HUD: 값과 경험치 fill은 동적으로 변경 가능 -->
    <section class="top-hud" aria-label="상단 게임 정보" style="--exp-progress: 38%;">
      <div class="top-profile">
        <img class="top-profile-portrait" src="image/ui_top_luna_portrait.png" alt="" aria-hidden="true" />
        <img class="top-profile-frame" src="image/ui_top_avatar_frame.png" alt="" aria-hidden="true" />
      </div>
      <div class="top-player-name">루나 벨</div>
      <div class="top-level">15</div>
      <div class="top-exp">
        <div class="top-exp-fill" aria-hidden="true"></div>
        <img class="top-exp-frame" src="image/ui_top_exp_frame.png" alt="" aria-hidden="true" />
      </div>
      <button class="top-currency top-coin" data-name="골드" aria-label="골드">
        <img class="top-currency-panel" src="image/ui_top_currency_panel.png" alt="" aria-hidden="true" />
        <img class="top-currency-icon" src="image/ui_top_icon_coin.png" alt="" aria-hidden="true" />
        <span>12,650</span>
        <b aria-hidden="true">+</b>
      </button>
      <button class="top-currency top-gem" data-name="보석" aria-label="보석">
        <img class="top-currency-panel" src="image/ui_top_currency_panel.png" alt="" aria-hidden="true" />
        <img class="top-currency-icon" src="image/ui_top_icon_gem.png" alt="" aria-hidden="true" />
        <span>340</span>
        <b aria-hidden="true">+</b>
      </button>
    </section>

    <!-- 왼쪽 게임 메뉴: 프레임/아이콘 이미지 + 별도 텍스트 -->
    <nav class="left-menu" aria-label="왼쪽 게임 메뉴">
      <button class="left-menu-btn left-menu-broom" data-name="빗자루" aria-label="빗자루">
        <img class="left-menu-frame" src="image/ui_left_button_frame.png" alt="" aria-hidden="true" />
        <img class="left-menu-icon" src="image/ui_left_icon_broom.png" alt="" aria-hidden="true" />
        <span class="left-menu-label">빗자루</span>
      </button>
      <button class="left-menu-btn left-menu-shop" data-name="상점" aria-label="상점">
        <img class="left-menu-frame" src="image/ui_left_button_frame.png" alt="" aria-hidden="true" />
        <img class="left-menu-icon" src="image/ui_left_icon_shop.png" alt="" aria-hidden="true" />
        <span class="left-menu-label">상점</span>
      </button>
      <button class="left-menu-btn left-menu-book" data-name="도감" aria-label="도감">
        <img class="left-menu-frame" src="image/ui_left_button_frame.png" alt="" aria-hidden="true" />
        <img class="left-menu-icon" src="image/ui_left_icon_book.png" alt="" aria-hidden="true" />
        <span class="left-menu-label">도감</span>
      </button>
    </nav>

    <nav class="right-menu" aria-label="오른쪽 보조 메뉴">
      <button class="right-menu-btn right-menu-mail" data-name="우편" aria-label="우편">
        <img class="right-menu-frame" src="image/ui_left_button_frame.png" alt="" aria-hidden="true" />
        <img class="right-menu-icon" src="image/ui_right_icon_mail.png" alt="" aria-hidden="true" />
        <span class="right-menu-label">우편</span>
      </button>
      <button class="right-menu-btn right-menu-event" data-name="이벤트" aria-label="이벤트">
        <img class="right-menu-frame" src="image/ui_left_button_frame.png" alt="" aria-hidden="true" />
        <img class="right-menu-icon" src="image/ui_right_icon_event.png" alt="" aria-hidden="true" />
        <span class="right-menu-label">이벤트</span>
      </button>
    </nav>

    <nav class="bottom-menu" aria-label="하단 게임 메뉴">
      <button class="bottom-menu-btn bottom-menu-myroom" data-name="마이룸" aria-label="마이룸">
        <img src="image/ui_bottom_myroom.png" alt="" aria-hidden="true" />
      </button>
      <button class="bottom-menu-btn bottom-menu-outfit" data-name="옷장" aria-label="옷장">
        <img src="image/ui_bottom_outfit.png" alt="" aria-hidden="true" />
      </button>
      <button class="bottom-menu-btn bottom-menu-friends" data-name="친구" aria-label="친구">
        <img src="image/ui_bottom_friends.png" alt="" aria-hidden="true" />
      </button>
      <button class="bottom-menu-btn bottom-menu-record" data-name="기록" aria-label="기록">
        <img src="image/ui_bottom_record.png" alt="" aria-hidden="true" />
      </button>
      <button class="bottom-menu-btn bottom-menu-settings" data-name="설정" aria-label="설정">
        <img src="image/ui_bottom_settings.png" alt="" aria-hidden="true" />
      </button>
    </nav>

    <nav class="action-menu" aria-label="게임 액션 메뉴">
      <button class="action-menu-btn action-menu-daily" data-name="일일 의뢰" aria-label="일일 의뢰">
        <img src="image/ui_action_daily.png" alt="" aria-hidden="true" />
      </button>
      <button class="action-menu-btn request-action-btn action-menu-request" data-name="의뢰하기" aria-label="의뢰하기">
        <img src="image/ui_action_request.png" alt="" aria-hidden="true" />
      </button>
      <button class="action-menu-btn action-menu-adventure" data-name="모험" aria-label="모험">
        <img src="image/ui_action_adventure.png" alt="" aria-hidden="true" />
      </button>
      <button class="action-menu-btn action-menu-special" data-name="특별 의뢰" aria-label="특별 의뢰">
        <img src="image/ui_action_special.png" alt="" aria-hidden="true" />
      </button>
    </nav>

    <section class="request-screen" aria-label="의뢰 선택 화면">
      <button class="request-back" data-name="돌아가기" aria-label="돌아가기">
        <img src="image/ui_request_back_button.png" alt="" aria-hidden="true" />
      </button>

      <div class="request-title">
        <span>의뢰 선택</span>
      </div>

      <div class="request-currencies" aria-hidden="true">
        <div class="request-currency">
          <img src="image/ui_top_currency_panel.png" alt="" />
          <img class="request-currency-icon" src="image/ui_top_icon_coin.png" alt="" />
          <span>12,650</span>
          <b>+</b>
        </div>
        <div class="request-currency">
          <img src="image/ui_top_currency_panel.png" alt="" />
          <img class="request-currency-icon" src="image/ui_top_icon_gem.png" alt="" />
          <span>340</span>
          <b>+</b>
        </div>
      </div>

      <div class="request-list">
        <button class="request-card" data-name="케이크 배달">
          <img class="request-card-frame" src="image/ui_request_detail_card_frame.png" alt="" aria-hidden="true" />
          <img class="rq-icon" src="image/request_icon_frame1.png" alt="" aria-hidden="true" />
          <span class="rq-info">
            <span class="rq-title">케이크 배달</span>
            <span class="rq-desc">마녀의 생일 케이크를<br />딸에게 배달해주세요.</span>
          </span>
          <span class="rq-meta">
            <span class="rq-mrow">
              <span class="rq-diff-tag">난이도</span>
              <span class="rq-stars" aria-label="난이도 별 3개"><i class="on">★</i><i class="on">★</i><i class="on">★</i><i>★</i><i>★</i></span>
            </span>
            <span class="rq-mrow">
              <span class="rq-reward-label">보상</span>
              <span class="rq-reward-vals">
                <img class="rq-coin" src="image/ui_top_icon_coin.png" alt="" aria-hidden="true" /><span class="rq-gold">1,200</span>
                <img class="rq-gem" src="image/ui_top_icon_gem.png" alt="" aria-hidden="true" /><span class="rq-gemval">20</span>
              </span>
            </span>
          </span>
        </button>

        <button class="request-card" data-name="고양이 배달">
          <img class="request-card-frame" src="image/ui_request_detail_card_frame.png" alt="" aria-hidden="true" />
          <img class="rq-icon" src="image/request_icon_frame2.png" alt="" aria-hidden="true" />
          <span class="rq-info">
            <span class="rq-title">고양이 배달</span>
            <span class="rq-desc">겁이 많은 고양이를<br />안전하게 배달해주세요.</span>
          </span>
          <span class="rq-meta">
            <span class="rq-mrow">
              <span class="rq-diff-tag">난이도</span>
              <span class="rq-stars" aria-label="난이도 별 4개"><i class="on">★</i><i class="on">★</i><i class="on">★</i><i class="on">★</i><i>★</i></span>
            </span>
            <span class="rq-mrow">
              <span class="rq-reward-label">보상</span>
              <span class="rq-reward-vals">
                <img class="rq-coin" src="image/ui_top_icon_coin.png" alt="" aria-hidden="true" /><span class="rq-gold">1,600</span>
                <img class="rq-gem" src="image/ui_top_icon_gem.png" alt="" aria-hidden="true" /><span class="rq-gemval">25</span>
              </span>
            </span>
          </span>
        </button>

        <button class="request-card" data-name="마력 포션 배송">
          <img class="request-card-frame" src="image/ui_request_detail_card_frame.png" alt="" aria-hidden="true" />
          <img class="rq-icon" src="image/request_icon_frame4.png" alt="" aria-hidden="true" />
          <span class="rq-info">
            <span class="rq-title">마력 포션 배송</span>
            <span class="rq-desc">마법 학교에 마력<br />포션을 납품해주세요.</span>
          </span>
          <span class="rq-meta">
            <span class="rq-mrow">
              <span class="rq-diff-tag">난이도</span>
              <span class="rq-stars" aria-label="난이도 별 3개"><i class="on">★</i><i class="on">★</i><i class="on">★</i><i>★</i><i>★</i></span>
            </span>
            <span class="rq-mrow">
              <span class="rq-reward-label">보상</span>
              <span class="rq-reward-vals">
                <img class="rq-coin" src="image/ui_top_icon_coin.png" alt="" aria-hidden="true" /><span class="rq-gold">1,100</span>
                <img class="rq-gem" src="image/ui_top_icon_gem.png" alt="" aria-hidden="true" /><span class="rq-gemval">15</span>
              </span>
            </span>
          </span>
        </button>

        <button class="request-card request-card-locked" data-name="드래곤 알 배달">
          <img class="request-card-frame" src="image/ui_request_detail_card_frame.png" alt="" aria-hidden="true" />
          <img class="rq-icon" src="image/request_icon_frame3.png" alt="" aria-hidden="true" />
          <span class="rq-info">
            <span class="rq-title">드래곤 알 배달</span>
            <span class="rq-desc">부화 전 드래곤 알을<br />마을로 배달해주세요.</span>
          </span>
          <span class="rq-meta">
            <span class="rq-mrow">
              <span class="rq-diff-tag">난이도</span>
              <span class="rq-stars" aria-label="난이도 별 5개"><i class="on">★</i><i class="on">★</i><i class="on">★</i><i class="on">★</i><i class="on">★</i></span>
            </span>
            <span class="rq-mrow rq-lock-row">
              <svg class="rq-lock" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm0 2a3 3 0 0 1 3 3v3H9V7a3 3 0 0 1 3-3zm0 9a1.6 1.6 0 0 1 .9 2.93V18a.9.9 0 0 1-1.8 0v-1.07A1.6 1.6 0 0 1 12 13z"/></svg>
            </span>
          </span>
        </button>
      </div>

      <button class="request-refresh" data-name="의뢰 갱신" aria-label="의뢰 갱신">
        <img src="image/ui_request_refresh_full.png" alt="" aria-hidden="true" />
      </button>
    </section>

    <section class="play-screen" aria-label="배달 비행 게임 화면">
      <div class="play-stage">
        <img class="play-bg play-bg-panorama" src="image/play_background_skycity_panorama.png" alt="" aria-hidden="true" />
        <canvas class="play-canvas" id="play-canvas" width="844" height="390"></canvas>
        <div class="play-object-layer" aria-hidden="true"></div>
        <img class="play-luna" src="image/luna_game_broom_pose_side.png" alt="루나 벨" />
      </div>
      <div class="play-countdown" aria-live="polite" aria-hidden="true">
        <span class="play-countdown-text"></span>
      </div>

      <div class="play-hud" aria-label="게임 정보">
        <div class="play-bars">
          <img class="play-bars-frame" src="image/ui_game_status_frame.png" alt="" aria-hidden="true" />
          <div class="play-meter play-hp" style="--meter-value: 66%;">
            <img class="play-meter-icon" src="image/ui_game_icon_heart.png" alt="" aria-hidden="true" />
            <span class="play-meter-label">HP</span>
            <i class="play-meter-fill"></i>
            <span class="play-meter-value play-hp-value">100/100</span>
          </div>
          <div class="play-meter play-mp" style="--meter-value: 66%;">
            <img class="play-meter-icon" src="image/ui_game_icon_star.png" alt="" aria-hidden="true" />
            <span class="play-meter-label">MP</span>
            <i class="play-meter-fill"></i>
            <span class="play-meter-value play-mp-value">100/100</span>
          </div>
        </div>
        <div class="play-timer" aria-label="남은 시간">
          <img class="play-timer-frame" src="image/ui_game_timer_frame.png" alt="" aria-hidden="true" />
          <span class="play-timer-label">남은 시간</span>
          <span class="play-timer-value">02:00</span>
        </div>
        <div class="play-distance" aria-label="물품 상태">
          <img class="play-distance-frame" src="image/ui_game_distance_frame.png" alt="" aria-hidden="true" />
          <span class="play-distance-label">물품 상태</span>
          <span class="play-distance-value">100%</span>
        </div>
        <button class="play-pause" data-name="일시정지" aria-label="일시정지" data-idle-src="image/game_button_pause_idle.png" data-pressed-src="image/game_button_pause_pressed.png">
          <img src="image/game_button_pause_idle.png" alt="" aria-hidden="true" />
        </button>
      </div>

      <div class="play-progress" aria-label="배달 진행도" style="--progress: 0%;">
        <span class="play-progress-start">출발</span>
        <i><b></b></i>
        <span class="play-progress-end">도착</span>
      </div>

      <div class="play-controls play-controls-left" aria-label="상승 하강 조작">
        <button class="play-control-btn play-up" data-name="상승" aria-label="상승" data-idle-src="image/game_button_up_idle.png" data-pressed-src="image/game_button_up_pressed.png">
          <img src="image/game_button_up_idle.png" alt="" aria-hidden="true" />
        </button>
        <button class="play-control-btn play-down" data-name="하강" aria-label="하강" data-idle-src="image/game_button_down_idle.png" data-pressed-src="image/game_button_down_pressed.png">
          <img src="image/game_button_down_idle.png" alt="" aria-hidden="true" />
        </button>
        <button class="play-control-btn play-back" data-name="뒤로" aria-label="뒤로" data-idle-src="image/game_button_back_idle.png" data-pressed-src="image/game_button_back_pressed.png">
          <img src="image/game_button_back_idle.png" alt="" aria-hidden="true" />
        </button>
        <button class="play-control-btn play-front" data-name="앞으로" aria-label="앞으로" data-idle-src="image/game_button_front_idle.png" data-pressed-src="image/game_button_front_pressed.png">
          <img src="image/game_button_front_idle.png" alt="" aria-hidden="true" />
        </button>
      </div>

      <div class="play-controls play-controls-right" aria-label="스킬 조작">
        <button class="play-control-btn play-skill" data-name="스킬" aria-label="스킬" data-idle-src="image/game_button_star_idle.png" data-pressed-src="image/game_button_star_pressed.png">
          <img src="image/game_button_star_idle.png" alt="" aria-hidden="true" />
        </button>
        <button class="play-control-btn play-shield" data-name="보호막" aria-label="보호막" data-idle-src="image/game_button_shield_idle.png" data-pressed-src="image/game_button_shield_pressed.png">
          <img src="image/game_button_shield_idle.png" alt="" aria-hidden="true" />
        </button>
      </div>
    </section>

    <!-- 배달 성공 결과 화면 (가로) -->
    <section class="success-screen" aria-label="배달 성공 결과">
      <img class="success-luna" src="image/luna_delivery_success_transparent.png" alt="" aria-hidden="true" />
      <div class="success-board">
        <img class="success-board-bg" src="image/success/success-board-panel.png" alt="" aria-hidden="true" />
        <img class="success-banner" src="image/success/success-title-banner.png" alt="배달 성공!" />
        <div class="success-body">
          <div class="success-stars" data-success-stars>
            <img class="s-star" src="image/success/success-star.png" alt="" aria-hidden="true" />
            <img class="s-star" src="image/success/success-star.png" alt="" aria-hidden="true" />
            <img class="s-star" src="image/success/success-star.png" alt="" aria-hidden="true" />
          </div>
          <div class="success-rewards-title">획득 보상</div>
          <div class="success-reward-slots">
            <div class="success-slot">
              <img class="slot-frame" src="image/success/success-reward-slot.png" alt="" aria-hidden="true" />
              <img class="slot-icon" src="image/ui_top_icon_coin.png" alt="" aria-hidden="true" />
              <span class="slot-count" data-reward="gold">1,200</span>
            </div>
            <div class="success-slot">
              <img class="slot-frame" src="image/success/success-reward-slot.png" alt="" aria-hidden="true" />
              <img class="slot-icon" src="image/ui_top_icon_gem.png" alt="" aria-hidden="true" />
              <span class="slot-count" data-reward="gem">20</span>
            </div>
            <div class="success-slot">
              <img class="slot-frame" src="image/success/success-reward-slot.png" alt="" aria-hidden="true" />
              <img class="slot-icon" data-reward="itemIcon" src="image/ui_request_icon_cake.png" alt="" aria-hidden="true" />
              <span class="slot-count" data-reward="item">1</span>
            </div>
          </div>
          <div class="success-buttons">
            <button class="success-btn success-btn-town" data-success-action="town" aria-label="마을로 돌아가기">
              <img src="image/success/success-button-town.png" alt="마을로 돌아가기" />
            </button>
            <button class="success-btn success-btn-next" data-success-action="next" aria-label="다음 의뢰로 이동">
              <img src="image/success/success-button-next.png" alt="다음 의뢰로 이동" />
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js?v=20260709q"></script>
  <script src="js/game.js?v=20260709q"></script>
  <script src="js/luna-mesh.js?v=20260709q"></script>
  <script src="js/nero-mesh.js?v=20260709q"></script>
  <script src="js/bgm.js?v=20260709q"></script>
  <script src="js/splash.js?v=20260709q"></script>
</body>
</html>
